<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dark Chat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#0b141a;
font-family:sans-serif;
}

.app{
max-width:430px;
min-width:320px;
height:100vh;
margin:auto;
display:flex;
flex-direction:column;
background:#0b141a;
}

#login{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

.header{
height:50px;
background:#075E54;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
}

.chat{
flex:1;
overflow:auto;
padding:6px;
}

.msg{
padding:8px;
border-radius:10px;
margin:6px 0;
max-width:75%;
color:white;
}

.me{
background:#005c4b;
margin-left:auto;
}

.other{
background:#202c33;
}

.replyBox{
background:#1f2c34;
color:white;
padding:5px;
font-size:12px;
display:none;
}

.inputBox{
height:55px;
display:flex;
gap:5px;
padding:5px;
background:#202c33;
}

.input{
flex:1;
border:none;
border-radius:20px;
padding:0 10px;
background:#2a3942;
color:white;
}

.send{
width:40px;
border:none;
border-radius:50%;
background:#25D366;
color:white;
}

video{
width:100%;
background:black;
}

</style>
</head>

<body>

<div class="app">

<div id="login">
<h3>Enter Code</h3>
<input id="code">
<button onclick="login()">Login</button>
</div>

<div id="chatPage" style="display:none;flex-direction:column;height:100%;">

<div class="header">
Dark Chat
<button onclick="startShare()">📺</button>
</div>

<video id="screenVideo" autoplay></video>

<div id="chat" class="chat"></div>

<div id="replyBox" class="replyBox"></div>

<div class="inputBox">
<input id="msg" class="input" onkeydown="enterSend(event)">
<input type="file" id="file" style="display:none" onchange="uploadFile()">
<button onclick="file.click()">📎</button>
<button class="send" onclick="send()">➤</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyDZoS88xDw7diC4YRVgiNYyiq9Uh-VJWcc",
authDomain:"discord-8faee.firebaseapp.com",
databaseURL:"https://discord-8faee-default-rtdb.firebaseio.com",
projectId:"discord-8faee",
storageBucket:"discord-8faee.firebasestorage.app",
messagingSenderId:"605857326712",
appId:"1:605857326712:web:4f84ca9b3354f8d1f2af8d"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const storage=getStorage(app);

const users={
"1234":{name:"Girges"},
"2222":{name:"Beshoy"},
"3333":{name:"Youssef"},
"4444":{name:"Armia"}
};

let me=null;
let reply=null;

window.login=function(){
let c=code.value;
if(users[c]){
me=users[c];
login.style.display="none";
chatPage.style.display="flex";
}
}

window.enterSend=function(e){
if(e.key==="Enter") send();
}

window.send=function(){
if(msg.value==="") return;

push(ref(db,"messages"),{
name:me.name,
text:msg.value,
reply:reply
});

msg.value="";
replyBox.style.display="none";
reply=null;
}

onChildAdded(ref(db,"messages"),snap=>{
let m=snap.val();

let d=document.createElement("div");
d.className="msg "+(m.name===me.name?"me":"other");

let r="";
if(m.reply){
r=`<div style="font-size:11px;background:#111;padding:3px">${m.reply.name}: ${m.reply.text}</div>`;
}

d.innerHTML=`<b>${m.name}</b><br>${r}${m.text}`;

d.onclick=()=>{
reply={name:m.name,text:m.text};
replyBox.innerHTML="Reply: "+m.text;
replyBox.style.display="block";
};

chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
});

window.uploadFile=function(){
let f=file.files[0];
let path="files/"+Date.now()+f.name;
let sr=sRef(storage,path);

uploadBytes(sr,f).then(()=>{
getDownloadURL(sr).then(url=>{
push(ref(db,"messages"),{
name:me.name,
text:url
});
});
});
}

/* ⭐ SHARE SCREEN */
window.startShare=async function(){

try{
let stream=await navigator.mediaDevices.getDisplayMedia({
video:true,
audio:false
});

screenVideo.srcObject=stream;

}catch(e){
alert("Screen Share not supported");
}

}

</script>

</body>
</html>
