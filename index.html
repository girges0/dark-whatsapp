<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dark Chat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>

body{
margin:0;
background:#0b141a;
font-family:sans-serif;
}

.app{
width:100%;
max-width:430px;
min-width:320px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
background:#0b141a;
}

/* LOGIN */
#login{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

#login input{
padding:10px;
border-radius:8px;
border:none;
margin:10px;
}

/* HEADER */
.header{
height:52px;
background:#075E54;
color:white;
display:flex;
align-items:center;
padding:8px 10px;
font-size:16px;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:6px;
}

.message{
max-width:78%;
padding:8px 10px;
border-radius:10px;
margin:6px 0;
font-size:14px;
word-break:break-word;
}

.me{
background:#005c4b;
margin-left:auto;
color:white;
}

.other{
background:#202c33;
color:white;
}

/* INPUT */
.inputBox{
height:54px;
display:flex;
align-items:center;
gap:5px;
padding:6px;
background:#202c33;
}

.messageInput{
flex:1;
height:38px;
border-radius:20px;
border:none;
padding:0 12px;
background:#2a3942;
color:white;
}

.sendBtn{
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#25D366;
color:white;
font-size:16px;
}

#fileBtn{
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#202c33;
color:white;
font-size:18px;
}

img.chatImage{
max-width:150px;
border-radius:8px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="app">

<div id="login">
<h3>Enter Code</h3>
<input id="codeInput" type="password">
<button onclick="login()">Login</button>
</div>

<div id="chatPage" style="display:none;flex-direction:column;height:100%;">
<div class="header">Dark Chat</div>

<div id="chat" class="chat"></div>

<div class="inputBox">
<input id="messageInput" class="messageInput" placeholder="Message" onkeydown="enterSend(event)">
<input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
<button id="fileBtn" onclick="document.getElementById('fileInput').click()">📎</button>
<button class="sendBtn" onclick="sendMessage()">➤</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyD8IX3-ExCCvMb3NRjb2gw5CsCFLbNH8Uk",
authDomain: "dark-whats-app.firebaseapp.com",
databaseURL: "https://dark-whats-app-default-rtdb.firebaseio.com",
projectId: "dark-whats-app",
storageBucket: "dark-whats-app.firebasestorage.app",
messagingSenderId: "806320754204",
appId: "1:806320754204:web:34470ac5b862466621d9d9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const users = {
"1234": {name:"Girges", admin:true},
"2222": {name:"Beshoy", admin:false},
"3333": {name:"Youssef", admin:false},
"4444": {name:"Armia", admin:false}
};

let currentUser=null;

// LOGIN
window.login=function(){
let code=document.getElementById("codeInput").value;
if(users[code]){
currentUser=users[code];
login.style.display="none";
chatPage.style.display="flex";
}else{
alert("Wrong Code");
}
}

// SEND MESSAGE
window.sendMessage=function(){
let input=document.getElementById("messageInput");
if(input.value==="") return;

push(ref(db,"messages"),{
text:input.value,
name:currentUser.name,
time:Date.now()
});

input.value="";
}

// ENTER SEND
window.enterSend=function(e){
if(e.key==="Enter") sendMessage();
}

// RECEIVE
onChildAdded(ref(db,"messages"),snap=>{
let m=snap.val();
let id=snap.key;

let div=document.createElement("div");
div.className="message "+(m.name===currentUser.name?"me":"other");

if(m.file){
if(m.fileType==="image"){
div.innerHTML=`<b>${m.name}</b><br><img class="chatImage" src="${m.text}">`;
}else{
div.innerHTML=`<b>${m.name}</b><br><a href="${m.text}" target="_blank">${m.fileName}</a>`;
}
}else{
div.innerHTML=`<b>${m.name}</b><br>${m.text}`;
}

if(currentUser.admin){
let del=document.createElement("button");
del.innerText="Delete";
del.onclick=()=>remove(ref(db,"messages/"+id));
div.appendChild(del);
}

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

notify(m.name,m.text||"File");

});

// UPLOAD FILE
window.uploadFile=function(){
let file=document.getElementById("fileInput").files[0];
if(!file) return;

let path="files/"+Date.now()+"_"+file.name;
let storageRef=sRef(storage,path);

uploadBytes(storageRef,file).then(()=>{
getDownloadURL(storageRef).then(url=>{

push(ref(db,"messages"),{
text:url,
name:currentUser.name,
file:true,
fileName:file.name,
fileType:file.type.startsWith("image")?"image":"file"
});

});
});

}

// NOTIFICATION
Notification.requestPermission();
function notify(title,body){
if(Notification.permission==="granted"){
new Notification(title,{body:body});
}
}

</script>

</body>
</html>
