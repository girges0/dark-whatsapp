<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dark Chat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#0b141a;
font-family:sans-serif;
}

.app{
width:100%;
max-width:430px;
min-width:320px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

/* LOGIN */
#login{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

/* HEADER */
.header{
height:52px;
background:#075E54;
color:white;
display:flex;
align-items:center;
padding:8px;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:6px;
}

.message{
max-width:78%;
padding:8px;
border-radius:10px;
margin:6px 0;
color:white;
word-break:break-word;
}

.me{
background:#005c4b;
margin-left:auto;
}

.other{
background:#202c33;
}

/* REPLY BOX */
.replyBox{
background:#1f2c34;
padding:5px;
font-size:12px;
display:none;
color:white;
}

/* INPUT */
.inputBox{
height:54px;
display:flex;
align-items:center;
gap:5px;
padding:6px;
background:#202c33;
}

.messageInput{
flex:1;
height:38px;
border-radius:20px;
border:none;
padding:0 10px;
background:#2a3942;
color:white;
}

.sendBtn{
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#25D366;
color:white;
}

</style>
</head>

<body>

<div class="app">

<div id="login">
<input id="codeInput" placeholder="code">
<button onclick="login()">Login</button>
</div>

<div id="chatPage" style="display:none;flex-direction:column;height:100%;">
<div class="header">Dark Chat</div>

<div id="chat" class="chat"></div>

<div id="replyBox" class="replyBox"></div>

<div class="inputBox">
<input id="messageInput" class="messageInput" onkeydown="enterSend(event)">
<input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
<button onclick="fileInput.click()">📎</button>
<button class="sendBtn" onclick="sendMessage()">➤</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyD8IX3-ExCCvMb3NRjb2gw5CsCFLbNH8Uk",
authDomain:"dark-whats-app.firebaseapp.com",
databaseURL:"https://dark-whats-app-default-rtdb.firebaseio.com",
projectId:"dark-whats-app",
storageBucket:"dark-whats-app.firebasestorage.app",
messagingSenderId:"806320754204",
appId:"1:806320754204:web:34470ac5b862466621d9d9"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const storage=getStorage(app);

const users={
"1234":{name:"Girges"},
"2222":{name:"Beshoy"},
"3333":{name:"Youssef"},
"4444":{name:"Armia"}
};

let currentUser=null;
let replyData=null;

// LOGIN
window.login=function(){
let c=codeInput.value;
if(users[c]){
currentUser=users[c];
login.style.display="none";
chatPage.style.display="flex";
}
}

// ENTER SEND
window.enterSend=function(e){
if(e.key==="Enter") sendMessage();
}

// SEND
window.sendMessage=function(){
let txt=messageInput.value;
if(txt==="") return;

push(ref(db,"messages"),{
text:txt,
name:currentUser.name,
reply:replyData
});

messageInput.value="";
replyBox.style.display="none";
replyData=null;
}

// RECEIVE
onChildAdded(ref(db,"messages"),snap=>{
let m=snap.val();

let div=document.createElement("div");
div.className="message "+(m.name===currentUser.name?"me":"other");

let replyHTML="";
if(m.reply){
replyHTML=`<div style="font-size:11px;background:#111;padding:4px;border-left:3px solid #25D366">${m.reply.name}: ${m.reply.text}</div>`;
}

div.innerHTML=`
<b>${m.name}</b><br>
${replyHTML}
${m.text}
`;

div.onclick=()=>{
replyData={name:m.name,text:m.text};
replyBox.innerHTML="Replying to "+m.name+": "+m.text;
replyBox.style.display="block";
};

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

});

// UPLOAD
window.uploadFile=function(){
let f=fileInput.files[0];
let path="files/"+Date.now()+f.name;
let sr=sRef(storage,path);

uploadBytes(sr,f).then(()=>{
getDownloadURL(sr).then(url=>{
push(ref(db,"messages"),{
text:url,
name:currentUser.name,
file:true
});
});
});
}

</script>

</body>
</html>
