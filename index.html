<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dark Chat</title>
<style>
html, body{
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  background:#e5ddd5;
  height:100%;
}

/* Login */
#login{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#login input{
  padding:15px;
  font-size:18px;
  margin:10px;
  width:80%;
  max-width:400px;
  border-radius:8px;
  border:1px solid #ccc;
}
#login button{
  padding:15px 25px;
  background:#25D366;
  border:none;
  color:white;
  cursor:pointer;
  font-size:18px;
  border-radius:10px;
}

/* Chat Page */
#chatPage{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* Header */
#onlineList{
  height:56px;
  line-height:56px;
  padding:0 16px;
  background:#075e54;
  color:white;
  font-size:16px;
  font-weight:bold;
}

/* Chat area */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px 16px;
  display:flex;
  flex-direction:column;
}

/* Messages */
.msg{
  max-width:75%;
  padding:8px 12px;
  margin:6px 0;
  border-radius:18px;
  font-size:15px;
  word-wrap:break-word;
  position:relative;
  cursor:pointer;
}
.me{background:#dcf8c6;align-self:flex-end;}
.other{background:white;align-self:flex-start;}
.adminMsg{background:#ffd966;align-self:flex-start;}
.name{font-size:12px;color:#555;margin-bottom:4px;}
#typing{
  font-size:13px;
  color:gray;
  margin-left:10px;
  margin-bottom:4px;
}

/* Send Box */
#sendBox{
  height:56px;
  display:flex;
  padding:8px 10px;
  background:#f0f0f0;
  align-items:center;
  box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}
#msg{
  flex:1;
  height:40px;
  padding:8px 12px;
  border-radius:25px;
  border:1px solid #ccc;
  font-size:16px;
  outline:none;
}
#sendBtn{
  margin-left:10px;
  padding:10px 16px;
  border:none;
  background:#25D366;
  color:white;
  border-radius:50px;
  cursor:pointer;
  font-size:16px;
}
#sendBtn:hover{background:#20b858;}
#fileInput{margin-left:5px;cursor:pointer;}

/* Context Menu */
#contextMenu{
  position:absolute;
  background:white;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
  border-radius:8px;
  display:none;
  z-index:1000;
  min-width:160px;
}
#contextMenu button{
  width:100%;
  padding:12px;
  border:none;
  background:none;
  text-align:left;
  cursor:pointer;
  border-bottom:1px solid #ddd;
  font-size:16px;
}
#contextMenu button:last-child{border-bottom:none;}
#contextMenu button:hover{background:#f0f0f0;}

img{max-width:70%;border-radius:10px;}

/* Responsive */
@media screen and (max-width:600px){
  #msg{font-size:15px;}
  .msg{font-size:14px; padding:6px 10px;}
  #sendBtn{font-size:14px; padding:8px 14px;}
}
@media screen and (min-width:1200px){
  #msg{font-size:16px;}
  .msg{font-size:16px; padding:10px 14px;}
  #sendBtn{font-size:16px; padding:10px 16px;}
}
</style>
</head>
<body>

<div id="login">
<h2>Dark Chat</h2>
<input id="code" placeholder="Enter Secret Code">
<button onclick="login()">Login</button>
</div>

<div id="chatPage">
<div id="onlineList"></div>
<div id="chat"></div>
<div id="typing"></div>
<div id="sendBox">
<input id="msg" placeholder="Type a message">
<input type="file" id="fileInput" accept="image/*">
<button id="sendBtn" onclick="send()">Send</button>
</div>
</div>

<div id="contextMenu">
<button id="deleteBtnMenu">Delete ❌</button>
<button id="blockBtnMenu">Block ⛔</button>
<button id="unblockBtnMenu">Unblock ✅</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD8IX3-ExCCvMb3NRjb2gw5CsCFLbNH8Uk",
authDomain: "dark-whats-app.firebaseapp.com",
databaseURL: "https://dark-whats-app-default-rtdb.firebaseio.com",
projectId: "dark-whats-app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username = "";
let isAdmin = false;
const codes = {
"1234": {name:"Girges", admin:true}, 
"2222": {name:"Beshoy", admin:false},
"3333": {name:"Youssef", admin:false},
"4444": {name:"Armia", admin:false}
};

let blockedUsers = [];
let currentContextKey = null;
let currentContextUser = null;

/* Login */
function login(){
let code = document.getElementById("code").value;
if(codes[code]){
username = codes[code].name;
isAdmin = codes[code].admin;
document.getElementById("login").style.display="none";
document.getElementById("chatPage").style.display="flex";
set(ref(db,"online/"+username),true);
}else{alert("Wrong Code");}
}

/* Online list */
onValue(ref(db,"online"),(snap)=>{
let val = snap.val()||{};
let list = Object.keys(val).filter(u=>val[u]).join(", ");
document.getElementById("onlineList").innerText="Online: "+list;
});
window.onbeforeunload=()=>{if(username){set(ref(db,"online/"+username),false);}};

/* Send message */
function send(){
if(blockedUsers.includes(username)) return alert("You are blocked!");
let input = document.getElementById("msg");
let text = input.value.trim();
if(text==="") return;
push(ref(db,"chat"),{name:username,text:text,time:Date.now(),admin:isAdmin});
input.value="";
set(ref(db,"typing"),"");
}

/* Send image */
document.getElementById("fileInput").addEventListener("change",(e)=>{
let file = e.target.files[0];
if(!file) return;
let reader = new FileReader();
reader.onload = function(){
push(ref(db,"chat"),{name:username,text:"[Image]",img:reader.result,time:Date.now(),admin:isAdmin});
};
reader.readAsDataURL(file);
e.target.value="";
});

/* Typing */
document.getElementById("msg").addEventListener("input",()=>{
set(ref(db,"typing"),username+" typing...");
setTimeout(()=>set(ref(db,"typing"),""),1000);
});
onValue(ref(db,"typing"),snap=>{
document.getElementById("typing").innerText = snap.val()||"";
});

/* Context menu */
const contextMenu = document.getElementById("contextMenu");
const deleteBtnMenu = document.getElementById("deleteBtnMenu");
const blockBtnMenu = document.getElementById("blockBtnMenu");
const unblockBtnMenu = document.getElementById("unblockBtnMenu");
document.addEventListener("click",()=>{contextMenu.style.display="none";});

deleteBtnMenu.onclick = ()=>{
if(currentContextKey){
remove(ref(db,"chat/"+currentContextKey))
.then(()=>{contextMenu.style.display="none";})
.catch(err=>alert(err));
}
};
blockBtnMenu.onclick = ()=>{
if(currentContextUser && !blockedUsers.includes(currentContextUser)){blockedUsers.push(currentContextUser); alert(currentContextUser+" blocked"); contextMenu.style.display="none";}
};
unblockBtnMenu.onclick = ()=>{
if(currentContextUser){let i = blockedUsers.indexOf(currentContextUser); if(i>-1) blockedUsers.splice(i,1); alert(currentContextUser+" unblocked"); contextMenu.style.display="none";}
};

/* Show messages */
onChildAdded(ref(db,"chat"),(data)=>{
let m = data.val();
let key = data.key;
let div = document.createElement("div");
div.dataset.key = key;
div.dataset.user = m.name;

if(m.admin) div.classList.add("adminMsg");
else if(m.name==username) div.classList.add("me");
else div.classList.add("other");
div.classList.add("msg");

let content="<div class='name'>"+m.name+"</div>";
if(m.text) content+="<div>"+m.text+"</div>";
if(m.img) content+="<div><img src='"+m.img+"' /></div>";
div.innerHTML=content;

document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;

/* Double tap / double click for admin context menu */
if(isAdmin){
  let lastTap = 0;
  div.addEventListener("click",(e)=>{
    const currentTime = new Date().getTime();
    const tapLength = currentTime - lastTap;
    if(tapLength < 400 && tapLength > 0){ // double click
      currentContextKey = div.dataset.key;
      currentContextUser = div.dataset.user;
      contextMenu.style.top = e.pageY+"px";
      contextMenu.style.left = e.pageX+"px";
      contextMenu.style.display="block";
    }
    lastTap = currentTime;
  });

  div.addEventListener("touchstart",(e)=>{
    const currentTime = new Date().getTime();
    const tapLength = currentTime - (div.lastTouch || 0);
    if(tapLength < 400 && tapLength > 0){
      currentContextKey = div.dataset.key;
      currentContextUser = div.dataset.user;
      contextMenu.style.top = (e.touches[0].pageY)+"px";
      contextMenu.style.left = (e.touches[0].pageX)+"px";
      contextMenu.style.display="block";
    }
    div.lastTouch = currentTime;
  });
}
});

/* Enter to send */
document.getElementById("msg").addEventListener("keypress",(e)=>{if(e.key==="Enter"){send();}});

window.login=login; window.send=send;
</script>
</body>
</html>
